# Postgres local ReservaEstudio — porta 5433 no host, DB `reservaestudio`.
# DATABASE_URL: postgresql://postgres:postgres@localhost:5433/reservaestudio?schema=public
services:
  postgres:
    image: postgres:16-alpine
    container_name: reservaestudio-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservaestudio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
